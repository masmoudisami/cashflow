version: '3.8'

services:
  web:
    build: .
    container_name: cashflow_web
    ports:
      - "8085:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: cashflow_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cashflow_db
      MYSQL_USER: sami
      MYSQL_PASSWORD: Sm/131301
    ports:
      - "3309:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: cashflow_pma
    restart: always
    ports:
      - "8084:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db

volumes:
  db_data: